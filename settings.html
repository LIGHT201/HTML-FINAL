<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Configure your Zombiz display, color adjustments, and font sizes.">
    <title>Zombiz - Settings</title>
    
    <link rel="stylesheet" href="main.css">
    
    <script src="javascript/layout.js" defer></script>
    <script src="javascript/settings.js" defer></script>
</head>
<body>
    <main class="main">
        <h1>Control Panel</h1>

        <div class="settings-container">
            <div class="settings-section">
                <h2>Visual Layout</h2>
                
                <div class="setting-item">
                    <label>
                        <input type="checkbox" id="scanlines-setting" class="setting-checkbox">
                        <span>Scanlines Overlay</span>
                    </label>
                    <p class="setting-description">Toggles the retro animated screen overlay pattern.</p>
                </div>

                <div class="setting-item">
                    <label>
                        <input type="checkbox" id="high-contrast-setting" class="setting-checkbox">
                        <span>High Contrast Mode</span>
                    </label>
                    <p class="setting-description">Modifies readability and elements outlines.</p>
                </div>

                <div class="setting-item">
                    <label>
                        <input type="checkbox" id="dark-mode-setting" class="setting-checkbox">
                        <span>Dark Theme</span>
                    </label>
                    <p class="setting-description">Toggles light and dark visual style palettes.</p>
                </div>
            </div>

            <div class="settings-section">
                <h2>Text Metrics</h2>
                <div class="setting-item">
                    <label for="font-size-setting">
                        Font Sizing Base: <span id="font-size-value">100%</span>
                    </label>
                    <input type="range" id="font-size-setting" class="setting-slider" min="80" max="150" value="100" step="10">
                    <p class="setting-description">Scales text scaling parameters across all elements.</p>
                </div>
            </div>

            <div class="settings-section">
                <h2>System Adjustments</h2>
                <button id="reset-settings-btn" class="reset-btn">Reset Settings</button>
            </div>
        </div>
    </main>
</body>
</html>
